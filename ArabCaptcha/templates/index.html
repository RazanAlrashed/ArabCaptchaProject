<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>
  <link rel="icon" type="image/png" href="ArabCaptcha.png">
  <link rel="icon" type="image/png" href="/public/assets/ArabCaptcha.png">
  <link rel="icon" type="image/png" href="/static/assets/ArabCaptcha.png">

  <link rel="stylesheet" href="static/style.css" />

</head>

<body>
  <main class="page">
    <section class="card">
      <h1 class="title">تسجيل الدخول</h1>

      <form id="loginForm" class="form" novalidate>
        <label class="field">
          <span class="label">البريد الإلكتروني</span>
          <input id="email" type="email" placeholder="username@gmail.com" required />
          <small class="hint" id="emailHint"></small>
        </label>

        <label class="field">
          <span class="label">كلمة المرور</span>
          <div class="password-wrap">
            <input id="password" type="password" placeholder="Password" required />
            <button class="icon-btn" type="button" id="togglePwd" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="2" />
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2" />
              </svg>
            </button>
          </div>
          <small class="hint" id="pwdHint"></small>
        </label>

        <div class="row">
          <a class="link" href="#" onclick="return false;">نسيت كلمة المرور؟</a>
        </div>

        <!-- Inline CAPTCHA Widget -->
        <div id="arabcaptcha"></div>

        <button class="primary" type="submit">دخول</button>

        <!-- Login status message -->
        <div class="login-status" id="loginStatus" role="status" aria-live="polite"></div>

        <p class="footer">
           ليس لديك حساب؟
          <a class="link strong" href="#" onclick="return false;">سجل الآن</a>
        </p>
      </form>
    </section>
  </main>

  <script src="http://127.0.0.1:8000/public/arabcaptcha.js"></script>

  <script src="/static/script.js"></script>
</body>

</html>
