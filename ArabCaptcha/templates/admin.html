<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArabCaptcha Admin Portal</title>
    <link rel="icon" type="image/png" href="/public/assets/ArabCaptcha.png">
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F8F4EC;
            --surface: rgba(255,255,255,0.72);
            --border: rgba(214,202,186,0.85);
            --primary: #6B5F52;
            --primary-dark: #4A4239;
            --text: #3B2F25;
            --muted: #6B5F52;
            --green: #2D6A4F;
            --green-bg: #EBF5F0;
            --shadow: 0 18px 45px rgba(84,67,48,0.12);
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background:
                linear-gradient(rgba(120,105,88,0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120,105,88,0.045) 1px, transparent 1px),
                radial-gradient(circle at top right, rgba(107,95,82,0.18), transparent 38%),
                linear-gradient(135deg, #F8F4EC 0%, #EFE5D6 100%);
            background-size: 32px 32px, 32px 32px, auto, auto;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
        }

        .super-topbar {
            background: rgba(107, 95, 82, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(214,202,186,0.35);
            padding: 0 28px;
            height: 66px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(84,67,48,0.14);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            white-space: nowrap;
        }

     .logo-box {
    background: rgba(255,255,255,0.92);
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.logo-box img {
    width: 75%;
    height: 75%;
    object-fit: contain;
}

        .nav-menu {
            display: flex;
            gap: 8px;
            background: rgba(59,47,37,0.18);
            padding: 5px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.14);
        }

        .nav-btn {
            padding: 9px 20px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            color: rgba(255,255,255,0.82);
            cursor: pointer;
            border-radius: 13px;
            transition: 0.2s ease;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .nav-btn.active {
            background: rgba(255,255,255,0.95);
            color: var(--primary-dark);
            box-shadow: 0 8px 18px rgba(0,0,0,0.14);
        }

        .status-badge {
            font-size: 12px;
            color: var(--green);
            background: var(--green-bg);
            padding: 6px 14px;
            border-radius: 999px;
            font-weight: 600;
            border: 1px solid rgba(45,106,79,0.14);
            white-space: nowrap;
        }

        #contentFrame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        @media (max-width: 900px) {
            .super-topbar {
                padding: 10px 16px;
                height: auto;
                gap: 10px;
                flex-wrap: wrap;
            }

            .nav-menu {
                order: 3;
                width: 100%;
                overflow-x: auto;
                justify-content: flex-start;
            }

            .nav-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<div class="super-topbar">
    <div class="brand">
        <div class="logo-box"> <img src="/public/assets/ArabCaptcha.png" alt="logo"> </div>
        <span>لوحة التحكم</span>
    </div>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="switchPage('/dashboard', this)">الكلمات</button>
        <button class="nav-btn" onclick="switchPage('/challenges', this)">التحديات</button>
        <button class="nav-btn" onclick="switchPage('/live-demo', this)">التجربة الحية</button>
        <button class="nav-btn" onclick="switchPage('/bot-simulation', this)">محاكاة الاختبار</button>
    </div>

    <div class="status-badge">● النظام متصل</div>
</div>

<iframe id="contentFrame" src="/dashboard"></iframe>

<script>
function switchPage(url, btn) {
    document.getElementById('contentFrame').src = url;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>

</body>
</html>
